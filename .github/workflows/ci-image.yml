name: CI Image

# Build and push the CI Docker image when the Dockerfile changes.
# The image is used by offline-quality-gates.yml for Tauri builds on Linux.

on:
  push:
    branches: [main]
    paths:
      - '.github/Dockerfile.ci'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-ci-image:
    name: Build CI Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/Dockerfile.ci
          push: true
          tags: |
            ghcr.io/all-source-os/all-frame-ci:latest
            ghcr.io/all-source-os/all-frame-ci:${{ github.sha }}
